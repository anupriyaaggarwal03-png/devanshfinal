<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Whimsical Inquiry ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;1,500&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(rgba(255, 250, 240, 0.7), rgba(255, 250, 240, 0.7)), 
                              url('background.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Playfair Display', serif;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.8s ease; /* Smooth transition for movie effect */
        }

        /* Cinema Flash Effect Overlay */
        #cinema-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .container {
            background: rgba(255, 253, 250, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            border: 2px solid #d4af37;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 85%;
            max-width: 400px;
            z-index: 1;
            position: relative;
            animation: floatContainer 4s ease-in-out infinite, borderChanger 5s linear infinite;
            backdrop-filter: blur(5px);
        }

        @keyframes borderChanger {
            0% { border-color: #d4af37; }
            33% { border-color: #8b0000; }
            66% { border-color: #fffaf0; }
            100% { border-color: #d4af37; }
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        .media-style {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px double #d4af37;
            margin-bottom: 20px;
            padding: 5px;
            background: white;
            animation: borderChanger 5s linear infinite;
        }

        #envelope-wrapper {
            display: none;
            cursor: pointer;
            width: 240px;
            height: 160px;
            background: #fffdfa;
            border: 2px solid #d4af37;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: borderChanger 5s linear infinite;
        }

        #envelope-wrapper::before {
            content: "🌸 . 🌷 . 🌸";
            position: absolute;
            top: 10px; width: 100%; left: 0;
            font-size: 10px; opacity: 0.7;
        }

        #wax-seal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 45px; height: 45px;
            background: #c21e56; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .flying {
            animation: whimsicalFly 3s ease-in-out forwards;
            pointer-events: none;
        }

        @keyframes whimsicalFly {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            30% { transform: translate(-50px, -100px) rotate(-20deg) scale(0.8); }
            100% { transform: translate(600px, -800px) rotate(60deg) scale(0); opacity: 0; }
        }

        h1 {
            font-family: 'Pinyon Script', cursive;
            color: #8b0000;
            font-size: 2.5rem;
            margin: 0.5rem 0;
        }

        .wait-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #d4af37;
        }

        button {
            padding: 12px 25px;
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #d4af37;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            animation: borderChanger 5s linear infinite;
        }

        #yesBtn { background: #8b0000; color: white; border: none; }
        .pulse-glow { animation: glowing 1.5s infinite; }

        @keyframes glowing {
            0% { box-shadow: 0 0 5px #8b0000; }
            50% { box-shadow: 0 0 20px rgba(139, 0, 0, 0.4); }
            100% { box-shadow: 0 0 5px #8b0000; }
        }

        #celebration, #flower-page, #wait-wait-text { 
            display: none; 
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .flower-img {
            width: 100%;
            max-width: 280px;
            border-radius: 10px;
            border: 4px double #d4af37;
            animation: borderChanger 5s linear infinite;
        }

        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 15px;
            pointer-events: none;
            animation: floatUp 5s linear forwards;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="cinema-flash"></div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="main-content">
        <img src="us.jpeg" alt="Portrait" class="media-style">
        <h1>Dearest Devansh,</h1>
        <p style="font-style: italic; color: #555;">Would you do me the immense honor of being mine?</p>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
            <button id="yesBtn" onclick="movieSequence()">I shall</button>
            <button id="noBtn" onclick="makeYesBigger()">I cannot</button>
        </div>
    </div>

    <div id="celebration" class="container">
        <video id="successVideo" class="media-style" muted loop playsinline>
            <source src="celebration.mp4" type="video/mp4">
        </video>
        <h1>A Most Joyous Day!</h1>
        <div id="wait-wait-text" class="wait-text">Wait, wait...</div>
    </div>

    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div id="wax-seal">❤</div>
        <div style="position:absolute; bottom: 10px; width: 100%; font-size: 8px; color: #d4af37;">❧ ❧ ❧</div>
    </div>

    <div id="flower-page" class="container">
        <img src="flowers.jpeg" alt="Flowers" class="flower-img" id="finalFlowers">
        <p class="wait-text" style="margin-top: 15px;">Forever yours.</p>
    </div>

    <script>
        let yesSize = 1;
        const messages = ["Are you quite sure?", "Perhaps reconsider?", "My heart breaks...", "Yield to love!"];
        let messageIndex = 0;

        function playMusic() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(() => {});
        }

        function makeYesBigger() {
            playMusic();
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            yesBtn.classList.add('pulse-glow');
            yesSize += 0.3;
            yesBtn.style.transform = `scale(${yesSize})`;
            if (messageIndex < messages.length) {
                noBtn.innerText = messages[messageIndex];
                messageIndex++;
            }
        }

        // NEW MOVIE SEQUENCE LOGIC
        function movieSequence() {
            playMusic();
            const flash = document.getElementById('cinema-flash');
            
            // 1. Light Up (Flash)
            flash.style.opacity = '1';
            
            setTimeout(() => {
                // 2. Lights Out (Black Background)
                document.getElementById('main-content').style.display = 'none';
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = 'black';
                flash.style.opacity = '0';
                
                setTimeout(() => {
                    // 3. Start Video (Celebration Page)
                    const celebration = document.getElementById('celebration');
                    celebration.style.display = 'block';
                    setTimeout(() => { celebration.style.opacity = '1'; }, 50);
                    
                    const video = document.getElementById('successVideo');
                    video.play(); // Play the video now
                    
                    startConfetti();
                    
                    // Proceed with original timers
                    setTimeout(() => { document.getElementById('wait-wait-text').style.display = 'block'; }, 35000);

                    setTimeout(() => {
                        document.getElementById('celebration').style.display = 'none';
                        document.getElementById('envelope-wrapper').style.display = 'block';
                    }, 39000);
                    
                }, 1500); // 1.5 seconds of darkness
            }, 300); // 0.3 seconds of flash
        }

        function openEnvelope() {
            const envelope = document.getElementById('envelope-wrapper');
            envelope.classList.add('flying');
            setTimeout(() => {
                envelope.style.display = 'none';
                document.getElementById('flower-page').style.display = 'block';
                document.getElementById('flower-page').style.opacity = '1';
                setInterval(createHeart, 500);
            }, 2500);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = Math.random() > 0.5 ? '🌸' : '💗';
            heart.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function startConfetti() {
            var duration = 39 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                confetti({ 
                    particleCount: 2, 
                    angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#d4af37', '#8b0000', '#fffaf0']
                });
                confetti({ 
                    particleCount: 2, 
                    angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#d4af37', '#8b0000', '#fffaf0']
                });
            }, 150);
        }
    </script>
</body>
</html>
